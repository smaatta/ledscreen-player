# ─────────────────────────────────────────────────────────────────────────────
# LedscreenPlayer — Display region configuration
#
# The Linsn SB-8 sender box mirrors a specific region of the desktop and sends
# it to the LED wall.  Set these values to match that region exactly.
#
# How to find your values:
#   1. Run:  xrandr --query
#   2. Find the secondary output (e.g. HDMI-1, HDMI-2, DSI-1)
#      It will show something like:  1920x1080+1920+0
#      meaning: width=1920, height=1080, starts at x=1920, y=0
#   3. Set the values below to match.
# ─────────────────────────────────────────────────────────────────────────────

# X offset of the LED region on the extended desktop
# (0 = leftmost, = main display width if LED is to the right)
LED_X=1920

# Y offset of the LED region
# (0 = top, use a positive value if the LED region starts lower)
LED_Y=0

# Width of the LED panel in pixels
LED_WIDTH=1920

# Height of the LED panel in pixels
LED_HEIGHT=1080

# Name of the output that the SB-8 is connected to (from xrandr)
# Used to auto-detect position if you leave LED_X/LED_Y as 0.
LED_OUTPUT=HDMI-1
